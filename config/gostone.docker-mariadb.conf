# gostone + Docker MariaDB (see docker-compose.yml: host port 13306).
# Copy or use: gostone -c config/gostone.docker-mariadb.conf
# Override with GOSTONE_DATABASE_CONNECTION if needed.

[DEFAULT]
debug = true

[database]
# Keystone-style SQLAlchemy URL (same user/db naming as many dev stacks).
connection = mysql+pymysql://keystone:keystonepass@127.0.0.1:13306/keystone

[service]
listen = :5000
public_url = http://127.0.0.1:5000

[token]
provider = uuid
secret = unused-for-uuid-provider
expiration_hours = 24
