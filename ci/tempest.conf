# Minimal Tempest config for gostone (Keystone API v3).
# Placeholder __ADMIN_PASSWORD__ is replaced in CI (see .github/workflows/tempest.yml).
#
# Compatibility notes (addressed in gostone before relying on Tempest):
# - Dynamic creds: list_domains?name=, list_users?domain_id=, list_projects?domain_id=,
#   token roles as {id,name}, project on token includes name+domain; password by user id+password without domain.
# Reference: tempest init && etc/tempest.conf.sample

[DEFAULT]
use_stderr = true

[auth]
admin_username = admin
admin_project_name = admin
admin_password = __ADMIN_PASSWORD__
admin_domain_name = Default
# Tempest needs either dynamic creds (admin creates test users) or test_accounts_file.
use_dynamic_credentials = true
create_isolated_networks = false

[identity]
uri_v3 = http://127.0.0.1:5000/v3
auth_version = v3
region = RegionOne

[identity-feature-enabled]
api_v3 = true

[service_available]
nova = false
neutron = false
glance = false
cinder = false
swift = false
horizon = false

[validation]
run_validation = false

[enforce_scope]
keystone = false
